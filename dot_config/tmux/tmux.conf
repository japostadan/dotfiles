# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── General ───────────────────────────────────────────────────────────────────
set -g base-index 1           # start windows at 1
set -g pane-base-index 1      # start panes at 1
set -g renumber-windows on    # close gaps when a window is closed
set -g set-clipboard on       # sync with system clipboard
set -g detach-on-destroy off  # keep tmux open when last session closes
set -g mouse on               # enable mouse

# ── Vi mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=black,fg=white"
set -g status-left " #S "
set -g status-right " %H:%M  %d %b "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=white,fg=black"

# ── Keybindings ───────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Splits — keep current path
unbind '"'
unbind '%'
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Kill without confirmation prompt
bind q kill-pane
bind Q kill-window

# Lazygit popup
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit
